# Nginx — Open Graph 정적 파일 (bullslong.com 서버에 반영)
# /etc/nginx/nginx.conf 의 server { ... } 블록 안에 추가하거나 include 하세요.

charset utf-8;

# OG / favicon — SPA fallback 없이 정적 파일 직접 서빙
location = /og-image.png {
    expires 7d;
    add_header Cache-Control "public";
    try_files $uri =404;
}

location = /favicon-16x16.png {
    expires 30d;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
}

location = /favicon-32x32.png {
    expires 30d;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
}

location = /apple-touch-icon.png {
    expires 30d;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
}

location = /robots.txt {
    expires 1d;
    default_type text/plain;
    charset utf-8;
    add_header Content-Type "text/plain; charset=utf-8";
    add_header Cache-Control "public";
    try_files $uri =404;
}

location = /sitemap.xml {
    expires 1d;
    add_header Content-Type "application/xml";
    add_header Cache-Control "public";
    try_files $uri =404;
}

# SPA (기존 설정 유지)
