name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to EC2 (PM2)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate secrets
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          set -euo pipefail
          missing=0
          [ -z "${SERVER_HOST}" ] && echo "❌ SERVER_HOST is empty" && missing=1
          [ -z "${SERVER_USER}" ] && echo "❌ SERVER_USER is empty" && missing=1
          [ -z "${SERVER_SSH_KEY}" ] && echo "❌ SERVER_SSH_KEY is empty" && missing=1
          if [ "${missing}" -eq 1 ]; then
            echo "→ GitHub Settings → Secrets and variables → Actions 에서 등록하세요."
            exit 1
          fi
          echo "✅ Secrets present (HOST=${SERVER_HOST}, USER=${SERVER_USER})"

      - name: Prepare SSH key
        env:
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p "${HOME}/.ssh"
          chmod 700 "${HOME}/.ssh"

          printf '%s\n' "${SERVER_SSH_KEY}" \
            | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' \
            | sed '/^$/d' \
            > "${HOME}/.ssh/deploy_key"
          chmod 600 "${HOME}/.ssh/deploy_key"
          echo "DEPLOY_KEY_PATH=${HOME}/.ssh/deploy_key" >> "${GITHUB_ENV}"

          first_line=$(head -n 1 "${HOME}/.ssh/deploy_key")
          last_line=$(tail -n 1 "${HOME}/.ssh/deploy_key")
          echo "Key header: ${first_line}"
          echo "Key footer: ${last_line}"

          if [[ "${first_line}" != -----BEGIN* ]] || [[ "${last_line}" != -----END* ]]; then
            echo "❌ ERROR: SSH key must start with -----BEGIN and end with -----END"
            exit 1
          fi

          if ! ssh-keygen -y -f "${HOME}/.ssh/deploy_key" >/dev/null 2>&1; then
            echo "❌ ERROR: SERVER_SSH_KEY is not a valid private key."
            exit 1
          fi
          echo "✅ SSH private key format OK"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          set -euo pipefail
          cp .env.production.example .env
          npm ci
          npm run build
          test -f dist/index.html
          test -f dist/og-image.png
          test -f dist/robots.txt
          test -f dist/sitemap.xml
          grep -q 'property="og:image"' dist/index.html
          grep -q 'https://bullslong.com/og-image.png' dist/index.html
          grep -q 'Sitemap: https://bullslong.com/sitemap.xml' dist/robots.txt
          test -f dist/manifest.webmanifest
          test -f dist/sw.js
          echo "✅ SEO + PWA assets verified"
          echo "✅ frontend dist ready ($(du -sh dist | cut -f1))"

      - name: Test SSH connection
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          set -euo pipefail
          ssh-keyscan -H "${SERVER_HOST}" >> "${HOME}/.ssh/known_hosts" 2>/dev/null || true
          ssh -i "${DEPLOY_KEY_PATH}" -o BatchMode=yes -o ConnectTimeout=20 \
            "${SERVER_USER}@${SERVER_HOST}" 'echo "✅ SSH connection OK"'

      - name: Deploy to server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          set -euo pipefail
          ssh-keyscan -H "${SERVER_HOST}" >> "${HOME}/.ssh/known_hosts" 2>/dev/null || true
          SSH_OPTS=(-i "${DEPLOY_KEY_PATH}" -o BatchMode=yes -o ConnectTimeout=20)
          TARGET="${SERVER_USER}@${SERVER_HOST}"
          APP_DIR="/var/www/bullslong"

          echo "==> Sync repo on server"
          ssh "${SSH_OPTS[@]}" "${TARGET}" << 'REMOTE'
          set -euo pipefail
          APP_DIR="/var/www/bullslong"
          REPO_URL="https://github.com/trendkking/managestock.git"
          if [ ! -d "${APP_DIR}/.git" ]; then
            sudo mkdir -p "${APP_DIR}"
            sudo chown -R "$(whoami):$(whoami)" "${APP_DIR}"
            git clone "${REPO_URL}" "${APP_DIR}"
          fi
          cd "${APP_DIR}"
          git fetch origin main
          git checkout main
          git reset --hard origin/main
          REMOTE

          echo "==> Upload frontend dist"
          ssh "${SSH_OPTS[@]}" "${TARGET}" "mkdir -p ${APP_DIR}/frontend/dist"
          scp -r "${SSH_OPTS[@]}" frontend/dist/* "${TARGET}:${APP_DIR}/frontend/dist/"

          echo "==> Run deploy.sh on server"
          ssh "${SSH_OPTS[@]}" "${TARGET}" "cd ${APP_DIR} && chmod +x deploy.sh && SKIP_FRONTEND_BUILD=1 bash deploy.sh"

      - name: Deployment succeeded
        if: success()
        run: echo "✅ Deployment to production completed successfully."

      - name: Deployment failed
        if: failure()
        run: |
          echo "❌ Deployment failed."
          echo "→ 위 단계 로그에서 ❌ 가 표시된 단계를 확인하세요."
