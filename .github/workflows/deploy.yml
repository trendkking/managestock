name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to EC2 (PM2)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Prepare SSH key
        env:
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          if [ -z "${SERVER_SSH_KEY}" ]; then
            echo "ERROR: SERVER_SSH_KEY secret is empty."
            exit 1
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "${SERVER_SSH_KEY}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          if ! ssh-keygen -y -f ~/.ssh/deploy_key >/dev/null 2>&1; then
            echo "ERROR: SERVER_SSH_KEY is not a valid private key."
            echo "Paste the full PEM file (BEGIN/END lines included) into GitHub Secrets."
            exit 1
          fi
          ssh-keyscan -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key_path: ~/.ssh/deploy_key
          script_stop: true
          command_timeout: 15m
          script: |
            set -euo pipefail

            APP_DIR="/var/www/bullslong"
            REPO_URL="https://github.com/trendkking/managestock.git"

            export PATH="${PATH}:/usr/local/bin:${HOME}/.local/bin"
            if [ -s "${HOME}/.nvm/nvm.sh" ]; then
              source "${HOME}/.nvm/nvm.sh"
            fi

            echo "==> Prepare app directory"
            if [ ! -d "${APP_DIR}/.git" ]; then
              sudo mkdir -p "${APP_DIR}"
              sudo chown -R "$(whoami):$(whoami)" "${APP_DIR}"
              git clone "${REPO_URL}" "${APP_DIR}"
            fi

            cd "${APP_DIR}"

            echo "==> Sync latest code"
            git fetch origin main
            git checkout main
            git reset --hard origin/main

            if [ ! -f deploy.sh ]; then
              echo "ERROR: deploy.sh missing after sync"
              exit 1
            fi

            chmod +x deploy.sh
            bash deploy.sh

      - name: Deployment succeeded
        if: success()
        run: echo "✅ Deployment to production completed successfully."

      - name: Deployment failed
        if: failure()
        run: echo "❌ Deployment failed. Check the SSH step logs above."
