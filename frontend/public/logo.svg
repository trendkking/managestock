<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bronze" x1="8" y1="56" x2="56" y2="8" gradientUnits="userSpaceOnUse">
      <stop stop-color="#92400E"/>
      <stop offset="0.35" stop-color="#DC2626"/>
      <stop offset="0.7" stop-color="#B91C1C"/>
      <stop offset="1" stop-color="#7F1D1D"/>
    </linearGradient>
    <linearGradient id="horn" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FDE68A"/>
      <stop offset="1" stop-color="#B45309"/>
    </linearGradient>
    <linearGradient id="shadow" x1="32" y1="48" x2="32" y2="62" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1C1917" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#1C1917" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Charging Bull — 월가 상징, 측면 돌진 포즈 -->
  <ellipse cx="32" cy="58" rx="22" ry="4" fill="url(#shadow)"/>
  <!-- 몸통 -->
  <path d="M48 42c6-2 10-8 10-16 0-6-4-12-10-14-2 8-8 14-16 16-6 2-10 6-12 12h28c2-4 0-8 0-12z" fill="url(#bronze)"/>
  <!-- 앞다리 -->
  <path d="M18 44l-4 12h6l3-10c2-1 4-1 6 0l2 10h6l-3-14c-4-2-8-1-12 2z" fill="#991B1B"/>
  <!-- 뒷다리 -->
  <path d="M42 40l2 16h5l-1-12c3-1 5 1 7 4l1 8h5l-3-18c-3-4-8-5-12-2z" fill="#7F1D1D"/>
  <!-- 목·어깨 근육 -->
  <path d="M14 30c-2 10 2 18 10 22 8 4 18 2 24-4 6-6 8-16 4-24-4-10-14-16-24-14-8 2-12 10-14 20z" fill="url(#bronze)"/>
  <!-- 머리 (낮게 숙인 돌진) -->
  <path d="M8 34c-4-6-2-14 4-18 6-4 14-2 18 4 2 4 2 10-1 14-3 5-10 8-16 6-3-1-5-4-5-6z" fill="#B91C1C"/>
  <!-- 주둥이 -->
  <path d="M4 36c-3 2-3 6 0 8 2 2 6 2 9 0 1-2 0-4-2-5-3-2-5-2-7-3z" fill="#991B1B"/>
  <circle cx="6" cy="39" r="1.2" fill="#450A0A"/>
  <circle cx="9" cy="40" r="1.2" fill="#450A0A"/>
  <!-- 뿔 (뒤로 말린 월가 황소) -->
  <path d="M12 22c-2-10 4-18 12-20" stroke="url(#horn)" stroke-width="3.2" stroke-linecap="round" fill="none"/>
  <path d="M18 20c0-6 4-10 8-11" stroke="url(#horn)" stroke-width="2.4" stroke-linecap="round" fill="none"/>
  <!-- 눈 -->
  <circle cx="14" cy="30" r="2" fill="#1C1917"/>
  <path d="M13 29h3" stroke="#FEF3C7" stroke-width="0.8" stroke-linecap="round"/>
  <!-- 귀 -->
  <path d="M20 24l3 4-4 1z" fill="#7F1D1D"/>
</svg>
